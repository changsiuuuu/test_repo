name: "AMI Build"

on:
  # 처음 테스트 시에는 push 트리거 비활성화 권장
  # 안정화되면 주석 해제
  # push:
  #   branches: ["main", "master"]
  #   paths:
  #     - "packer/**"
  #     - "ansible/roles/base/**"
  workflow_dispatch:
    inputs:
      ami_purpose:
        description: "AMI 용도"
        required: true
        type: choice
        options: ['web', 'db']
        default: 'web'

permissions:
  contents: write

concurrency:
  group: ami-build-${{ github.event.inputs.ami_purpose || 'web' }}
  cancel-in-progress: false

jobs:
  build_ami:
    runs-on: self-hosted
    timeout-minutes: 30   # 무한 대기 방지

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # git push 위해 전체 히스토리 필요

      - name: Setup Packer
        uses: hashicorp/setup-packer@main
        with:
          version: "latest"

      - name: Set AMI Purpose
        id: vars
        run: |
          PURPOSE="${{ github.event.inputs.ami_purpose || 'web' }}"
          echo "purpose=$PURPOSE" >> $GITHUB_OUTPUT
          echo "AMI 용도: $PURPOSE"

      - name: Packer Init
        working-directory: packer
        run: packer init .

      - name: Packer Validate
        working-directory: packer
        run: |
          packer validate \
            -var "ami_purpose=${{ steps.vars.outputs.purpose }}" \
            .

      - name: Packer Build
        working-directory: packer
        run: |
          packer build \
            -var "ami_purpose=${{ steps.vars.outputs.purpose }}" \
            -machine-readable \
            . | tee packer-output.log

      # 디버깅용 로그 출력
      - name: Debug Packer Output
        if: always()
        working-directory: packer
        run: |
          echo "=== Packer 로그 마지막 30줄 ==="
          tail -30 packer-output.log || echo "로그 파일 없음"
          echo "=== artifact 라인 ==="
          grep 'artifact' packer-output.log || echo "artifact 라인 없음"

      - name: Extract AMI ID
        id: ami
        working-directory: packer
        run: |
          AMI_ID=$(grep 'artifact,0,id' packer-output.log | cut -d, -f6 | cut -d: -f2)
          if [ -z "$AMI_ID" ]; then
            echo "::error::AMI ID 추출 실패"
            exit 1
          fi
          echo "ami_id=$AMI_ID" >> $GITHUB_OUTPUT
          echo "생성된 AMI ID: $AMI_ID"

      - name: Update Terraform tfvars
        run: |
          PURPOSE="${{ steps.vars.outputs.purpose }}"
          AMI_ID="${{ steps.ami.outputs.ami_id }}"
          FILE="terraform/ami.auto.tfvars"
          
          mkdir -p terraform
          touch $FILE
          
          sed -i "/^${PURPOSE}_ami_id/d" $FILE
          echo "${PURPOSE}_ami_id = \"${AMI_ID}\"" >> $FILE
          
          echo "업데이트된 tfvars:"
          cat $FILE

      - name: Commit AMI ID
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add terraform/ami.auto.tfvars
          
          if git diff --cached --quiet; then
            echo "변경사항 없음. 커밋 스킵."
          else
            git commit -m "ci: update ${{ steps.vars.outputs.purpose }} AMI ID to ${{ steps.ami.outputs.ami_id }} [skip ci]"
            git pull --rebase origin ${{ github.ref_name }} || true
            git push
            echo "AMI ID 커밋 완료"
          fi

      - name: Send Success Notification
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            [AMI 빌드 완료]
            - 용도: ${{ steps.vars.outputs.purpose }}
            - AMI ID: ${{ steps.ami.outputs.ami_id }}
            - 트리거: ${{ github.actor }}
            
            tfvars가 자동 업데이트되었습니다.
            인프라 반영을 원하시면 infra-deploy 워크플로우를 수동 실행하십시오.

      - name: Send Failure Notification
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            [AMI 빌드 실패]
            - 용도: ${{ github.event.inputs.ami_purpose || 'web' }}
            - 실행자: ${{ github.actor }}
            GitHub Actions 로그를 확인하십시오.